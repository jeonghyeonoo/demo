# ─────────────────────────────────────────────────────────────────────────────
#  Nginx config for Mémoire frontend
#
#  All requests to /api/* are reverse-proxied to the Spring Boot backend.
#  This means index.html can use a relative path like /api/photos instead
#  of hardcoding http://localhost:8080 — no CORS issues, no port juggling.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Frontend static file ──────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Spring Boot backend ──────────────────────────────────────
    # "backend" is the service name defined in docker-compose.yml.
    # Docker's internal DNS resolves it to the backend container automatically.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for large photo uploads (up to 20MB)
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Allow large request bodies (multipart photo upload)
        client_max_body_size  25M;
    }

    # ── H2 console proxy (dev only — remove in production) ───────────────────
    location /h2-console/ {
        proxy_pass         http://backend:8080/h2-console/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
    }
}
